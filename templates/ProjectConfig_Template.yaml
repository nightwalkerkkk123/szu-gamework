# ProjectConfig Template
# Fill this out during Phase 1 (Pre-Production) via /uw-cmd-setup-project
# This file is the AI's primary context snapshot for your project

project_name: ""
genre: ""
target_platforms: []

# Unity
unity_version: "6.2.0f1"
render_pipeline: "URP"            # URP | HDRP | Built-in
scripting_backend: "IL2CPP"       # IL2CPP | Mono
ui_system: "UIToolkit"            # UIToolkit | UGUI | Mixed (hybrid: UI Toolkit menus + uGUI HUD is valid)
folder_strategy: "feature-based"  # feature-based | type-based
networking: "none"                # none | NGO | Mirror | Photon | Custom
async_pattern: "Awaitable"       # Awaitable | UniTask | Coroutines
use_ecs_dots: false

# Architecture
architecture_pattern: "so-first"  # so-first (ScriptableObject events/data) | di-first (DI container + MVC + Commands)
di_framework: "reflex"            # reflex | none (only relevant when architecture_pattern is di-first)

# Packages (name: version)
packages:
  com.unity.inputsystem: "1.11.0"
  # com.unity.cinemachine: "3.1.0"
  # com.unity.textmeshpro: "4.0.0"

# Third-Party
third_party: []
  # - name: "DOTween"
  #   version: "1.2.745"
  #   namespace: "DG.Tweening"

# Game Feel Middleware
feel_tools:
  tweening: "none"          # DOTween | PrimeTween | LeanTween | none
  feedback_system: "Custom" # Custom | none (code-based via DOTween/PrimeTween)
  audio: "Unity"            # FMOD | Wwise | Unity
  camera: "Custom"          # Custom | Cinemachine (opt-in if project needs it)

# Visual Packages (optional owned assets — set true only if purchased/imported)
visual_plugins:
  has_shapes: false         # Freya Holmér's Shapes — procedural vector drawing in code
  has_true_shadow: false    # True Shadow — soft UI drop shadows for UI Toolkit / UGUI

# MCP Integrations
# Ask user during /uw-cmd-setup-project which MCPs they have configured.
# Enable only what is available — never assume they are connected.
mcp:
  unity_mcp: false      # Lets AI inspect/modify scenes, prefabs, packages, run tests
  github_mcp: false     # Lets AI create repos, branches, commits, PRs
  linear_mcp: false     # Lets AI create/manage tasks and sprints
  notion_mcp: false     # Lets AI read/write design docs in Notion

# Documentation & Task Management
task_management: "None"   # Linear | Jira | Notion | None
documentation: "Markdown" # Notion | Confluence | Markdown | None

# Behavior
# Dev Mode: controls AI autonomy vs. user control for the whole project
# guided    = Collaborative — AI suggests, confirms before major changes (default)
# autonomous = AI works autonomously after onboarding Q&A, minimal interruptions
#              For best results, also enable Claude Code auto mode (claude --enable-auto-mode)
ai_mode: "guided"
prompt_logging: true      # Append every prompt + ≤200-word AI summary to docs/PromptLog.md

# Rule Overrides (uncomment to enable)
# rule_overrides:
#   allow_ugui: true
#   allow_coroutines_for_logic: true
